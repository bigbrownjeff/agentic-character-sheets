name: Render Moment

# Stitch one story's beat clips into a polished "moment" (captions + George narration +
# genre music) and upload it to R2. Triggered by the site (POST /api/render -> repository_dispatch)
# or manually with a JSON payload. ffmpeg can't run in the Pages serverless backend, so this
# CI runner does the heavy lifting and the site just polls R2 for the result.

on:
  repository_dispatch:
    types: [render-moment]
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON payload: { outKey, title, tone?, style?, genre?, clipKeys:[...], beats:[{caption,scene}] }'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core
      - name: Write payload
        env:
          PAYLOAD_DISPATCH: ${{ toJSON(github.event.client_payload) }}
          PAYLOAD_MANUAL: ${{ github.event.inputs.payload }}
        run: |
          if [ -n "$PAYLOAD_MANUAL" ]; then printf '%s' "$PAYLOAD_MANUAL" > /tmp/payload.json; else printf '%s' "$PAYLOAD_DISPATCH" > /tmp/payload.json; fi
          node -e "const p=JSON.parse(require('fs').readFileSync('/tmp/payload.json','utf8')); if(!p.outKey||!Array.isArray(p.clipKeys)||!p.clipKeys.length) throw new Error('bad payload'); console.log('payload ok:', p.outKey, p.clipKeys.length+' clips')"
      - name: Render
        env:
          RENDER_PAYLOAD: /tmp/payload.json
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/render-moment.mjs
